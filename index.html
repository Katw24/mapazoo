<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zoológico — Mapa Interativo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1a2a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .landing {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas#bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 110px;
      background: #2d4a1e;
      z-index: 1;
    }

    .ground-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 10px;
      background: #3a5c26;
    }

    .path {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 110px;
      background: #8b7355;
    }

    .path-line {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        #c4a97a 0px, #c4a97a 14px,
        transparent 14px, transparent 24px
      );
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding-bottom: 90px;
    }

    .title-sign {
      background: #5c3a1a;
      border: 4px solid #8b5e2a;
      padding: 16px 44px;
      position: relative;
    }

    .title-sign::before,
    .title-sign::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 44px;
      background: #8b5e2a;
    }

    .title-sign::before { left: -14px; }
    .title-sign::after  { right: -14px; }

    .title-text {
      font-size: 32px;
      font-weight: bold;
      color: #f5d98a;
      letter-spacing: 0.12em;
      text-shadow: 3px 3px 0 #3a2200;
    }

    .subtitle {
      font-size: 12px;
      color: #7ab87a;
      letter-spacing: 0.2em;
      margin-top: 8px;
      text-align: center;
    }

    .start-btn {
      background: #2d6a2d;
      border: 3px solid #4a9a4a;
      color: #b8f0b8;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.12em;
      padding: 16px 52px;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      font-family: Arial, sans-serif;
    }

    .start-btn:hover {
      background: #3a8a3a;
      transform: translateY(-2px);
    }

    .start-btn:active {
      transform: translateY(1px);
      background: #256225;
    }
  </style>
</head>
<body>

<div class="landing">

  <canvas id="bg"></canvas>

  <div class="ground">
    <div class="ground-stripe"></div>
    <div class="path">
      <div class="path-line"></div>
    </div>
  </div>

  <div class="content">
    <div>
      <div class="title-sign">
        <div class="title-text">ZOOLÓGICO</div>
      </div>
      <div class="subtitle">mapa interativo</div>
    </div>

    <button class="start-btn" onclick="window.location.href='page1.html'">
      &#9654; Começar
    </button>
  </div>

</div>

<script>
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
  }

  function px(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  }

  function drawMoon(cx, cy) {
    const s = 7;
    [[1,0],[2,0],[3,0],
     [0,1],[1,1],[2,1],[3,1],[4,1],
     [0,2],[1,2],[2,2],[3,2],[4,2],
     [0,3],[1,3],[2,3],[3,3],[4,3],
     [1,4],[2,4],[3,4]
    ].forEach(([c,r]) => px(cx + c*s, cy + r*s, s, s, "#f5e86e"));
  }

  function drawTree(x, y, dark) {
    const s = 6;
    const trunk = dark ? "#4a2800" : "#6b3a00";
    const l1    = dark ? "#1a4a1a" : "#2d7a2d";
    const l2    = dark ? "#245e24" : "#3a9a3a";
    [[2,4],[2,3],[1,3],[3,3]].forEach(([c,r]) => px(x+c*s, y+r*s, s, s, trunk));
    [[2,2],[1,2],[3,2],[2,1],[1,1],[3,1],[0,1],[4,1],[2,0],[1,0],[3,0]].forEach(([c,r]) =>
      px(x+c*s, y+r*s, s, s, r%2===0 ? l1 : l2));
  }

  function drawBush(x, y) {
    const s = 5;
    [[1,1],[2,1],[0,1],[3,1],[1,0],[2,0]].forEach(([c,r]) =>
      px(x+c*s, y+r*s, s, s, r===0 ? "#2d6a2d" : "#3a8a3a"));
  }

  function drawElephant(x, y) {
    const s = 6;
    const body = "#7a8a9a";
    const dark  = "#5a6a7a";
    [[1,0,dark],[2,0,dark],
     [0,1,body],[1,1,body],[2,1,body],[3,1,body],
     [0,2,body],[1,2,body],[2,2,body],[3,2,body],[4,2,body],
     [0,3,body],[1,3,body],[2,3,body],[3,3,body],[4,3,dark],[5,3,dark],
     [0,4,dark],[1,4,body],[2,4,body],[3,4,dark],
     [0,5,dark],[3,5,dark],
    ].forEach(([c,r,col]) => px(x+c*s, y+r*s, s, s, col));
    px(x+1*s+1, y+1*s+1, 4, 4, "#fff");
  }

  function drawLion(x, y) {
    const s = 6;
    const mane = "#c47a15";
    const face = "#d4a044";
    const leg  = "#a05a0a";
    [[1,0,mane],[2,0,mane],[3,0,mane],
     [0,1,mane],[1,1,face],[2,1,face],[3,1,face],[4,1,mane],
     [0,2,mane],[1,2,face],[2,2,face],[3,2,face],[4,2,mane],
     [1,3,leg], [2,3,face],[3,3,leg],
     [1,4,leg], [3,4,leg],
    ].forEach(([c,r,col]) => px(x+c*s, y+r*s, s, s, col));
    px(x+1*s+1, y+1*s+1, 4, 4, "#1a1a1a");
    px(x+3*s,   y+1*s+1, 4, 4, "#1a1a1a");
  }

  function drawBird(x, y) {
    const s = 5;
    [[0,0,"#4a7a9a"],[1,0,"#6aaaca"],[2,0,"#6aaaca"],[3,0,"#4a7a9a"],
     [1,1,"#6aaaca"],[2,1,"#6aaaca"],
     [1,2,"#8a6a00"],[2,2,"#8a6a00"],
    ].forEach(([c,r,col]) => px(x+c*s, y+r*s, s, s, col));
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = "#1a2a1a";
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 80; i++) {
      const sx = (i * 137 + 23) % W;
      const sy = (i * 89  + 11) % (H * 0.6);
      const sz = i % 3 === 0 ? 3 : 2;
      ctx.fillStyle = i % 5 === 0 ? "#f5e86e" : "rgba(255,255,255,0.45)";
      ctx.fillRect(sx, sy, sz, sz);
    }

    drawMoon(W - 140, 30);

    const groundY = H - 110;

    drawTree(40,       groundY - 130, false);
    drawTree(110,      groundY - 100, true);
    drawTree(W - 120,  groundY - 120, false);
    drawTree(W - 200,  groundY - 95,  true);

    drawBush(180, groundY - 32);
    drawBush(W - 220, groundY - 28);

    drawElephant(60,     groundY - 160);
    drawLion(W - 170,    groundY - 140);
    drawBird(W/2 - 80,   groundY - 170);
    drawBird(W/2 + 30,   groundY - 148);

    const fenceY = groundY + 8;
    for (let fx = 0; fx < W; fx += 28) {
      ctx.fillStyle = "#6b4a1a";
      ctx.fillRect(fx, fenceY, 6, 22);
    }
    ctx.fillStyle = "#8b6a2a";
    ctx.fillRect(0, fenceY + 4,  W, 4);
    ctx.fillRect(0, fenceY + 14, W, 4);
  }

  window.addEventListener("resize", resize);
  resize();
</script>

</body>
</html>
